name: SonarCloud Gate

# Runs after the CI workflow completes. Uses workflow_run so we have access to
# secrets (SONAR_TOKEN) even for fork PRs. Downloads the lcov coverage artifact
# from CI and runs the SonarCloud scan if no analysis exists yet.
#
# For internal PRs: the scan already ran in CI, so this just reads the results.
# For fork PRs: this is the only place the scan runs (CI skips it, no token).
#
# SECURITY: Fetches PR source only for SonarCloud static analysis. Does NOT
# execute any code from the PR. All workflow_run event data is passed through
# env vars (never inline ${{ }}) to prevent expression injection.

on:
  workflow_run:
    workflows: [CI]
    types: [completed]

permissions:
  contents: read
  pull-requests: write
  actions: read
  statuses: write

concurrency:
  group: sonarcloud-gate-${{ github.event.workflow_run.id }}
  cancel-in-progress: true

jobs:
  sonarcloud-gate:
    name: SonarCloud Quality Gate
    runs-on: ubuntu-latest
    # Only run for PRs where CI succeeded
    if: >-
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Get PR number
        id: pr
        env:
          PR_JSON: ${{ toJSON(github.event.workflow_run.pull_requests) }}
        run: |
          PR_NUMBER=$(echo "$PR_JSON" | \
            python3 -c "import sys,json; prs=json.load(sys.stdin); print(prs[0]['number'] if prs else '')")
          # Validate PR number is numeric to prevent injection
          if [[ -z "$PR_NUMBER" ]]; then
            echo "No PR associated with this workflow run. Skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          elif ! [[ "$PR_NUMBER" =~ ^[0-9]+$ ]]; then
            echo "ERROR: Invalid PR number: $PR_NUMBER"
            exit 1
          else
            echo "number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
            echo "PR #$PR_NUMBER"
          fi

      - name: Check for existing analysis
        if: steps.pr.outputs.skip != 'true'
        id: check
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
        run: |
          if [[ -z "$SONAR_TOKEN" ]]; then
            echo "SONAR_TOKEN not configured. Skipping."
            echo "status=skipped" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          GATE_JSON=$(curl -s -u "${SONAR_TOKEN}:" \
            "https://sonarcloud.io/api/qualitygates/project_status?projectKey=artifact-keeper_artifact-keeper&pullRequest=${PR_NUMBER}")
          GATE_STATUS=$(echo "$GATE_JSON" | python3 -c "import sys,json; print(json.load(sys.stdin)['projectStatus']['status'])" 2>/dev/null || echo "NONE")
          echo "Quality gate status from API: $GATE_STATUS"
          echo "status=$GATE_STATUS" >> "$GITHUB_OUTPUT"

      # For fork PRs (or when analysis is missing): download coverage and run scan.
      # Fetches source via git CLI in a run block (not actions/checkout) to avoid
      # CodeQL's untrusted-checkout flag on workflow_run privileged contexts.
      - name: Fetch PR source
        if: steps.check.outputs.status == 'NONE'
        env:
          PR_NUMBER: ${{ steps.pr.outputs.number }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          git init
          git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${REPO}.git"
          git fetch --depth=50 origin "pull/${PR_NUMBER}/head"
          git checkout FETCH_HEAD

      - name: Download coverage artifact
        if: steps.check.outputs.status == 'NONE'
        uses: actions/download-artifact@v4
        with:
          name: lcov-coverage
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Get PR metadata
        if: steps.check.outputs.status == 'NONE'
        id: pr_meta
        env:
          HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
          PR_JSON: ${{ toJSON(github.event.workflow_run.pull_requests) }}
        run: |
          echo "head_branch=$HEAD_BRANCH" >> "$GITHUB_OUTPUT"
          BASE_REF=$(echo "$PR_JSON" | python3 -c "import sys,json; prs=json.load(sys.stdin); print(prs[0]['base']['ref'] if prs else 'main')" 2>/dev/null || echo "main")
          echo "base_ref=$BASE_REF" >> "$GITHUB_OUTPUT"

      - name: Run SonarCloud Scan
        if: steps.check.outputs.status == 'NONE'
        uses: SonarSource/sonarqube-scan-action@v7
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=artifact-keeper_artifact-keeper
            -Dsonar.organization=artifact-keeper
            -Dsonar.rust.lcov.reportPaths=lcov.info
            -Dsonar.pullrequest.key=${{ steps.pr.outputs.number }}
            -Dsonar.pullrequest.branch=${{ steps.pr_meta.outputs.head_branch }}
            -Dsonar.pullrequest.base=${{ steps.pr_meta.outputs.base_ref }}

      - name: Wait for analysis processing
        if: steps.check.outputs.status == 'NONE'
        run: sleep 15

      # Fetch quality gate results (either from earlier CI scan or our scan above)
      - name: Get quality gate results
        if: steps.pr.outputs.skip != 'true' && steps.check.outputs.status != 'skipped'
        id: gate
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
        run: |
          # Retry a few times in case analysis is still processing
          for i in 1 2 3; do
            GATE_JSON=$(curl -s -u "${SONAR_TOKEN}:" \
              "https://sonarcloud.io/api/qualitygates/project_status?projectKey=artifact-keeper_artifact-keeper&pullRequest=${PR_NUMBER}")
            GATE_STATUS=$(echo "$GATE_JSON" | python3 -c "import sys,json; print(json.load(sys.stdin)['projectStatus']['status'])" 2>/dev/null || echo "NONE")
            if [[ "$GATE_STATUS" != "NONE" ]]; then break; fi
            echo "Analysis not ready, waiting... (attempt $i/3)"
            sleep 10
          done

          echo "status=$GATE_STATUS" >> "$GITHUB_OUTPUT"

          if [[ "$GATE_STATUS" == "NONE" ]]; then
            echo "Analysis still not available after retries."
            exit 0
          fi

          METRICS_JSON=$(curl -s -u "${SONAR_TOKEN}:" \
            "https://sonarcloud.io/api/measures/component?component=artifact-keeper_artifact-keeper&metricKeys=new_coverage,new_duplicated_lines_density,new_lines&pullRequest=${PR_NUMBER}")

          for metric in new_coverage new_duplicated_lines_density new_lines; do
            val=$(echo "$METRICS_JSON" | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          for m in data.get('component',{}).get('measures',[]):
              if m['metric'] == '${metric}':
                  print(m.get('period',{}).get('value', m.get('value','N/A')))
                  break
          else:
              print('N/A')
          " 2>/dev/null || echo "N/A")

            case "$metric" in
              new_coverage)          echo "coverage=${val}" >> "$GITHUB_OUTPUT" ;;
              new_duplicated_lines_density) echo "duplication=${val}" >> "$GITHUB_OUTPUT" ;;
              new_lines)             echo "lines=${val}" >> "$GITHUB_OUTPUT" ;;
            esac
          done

          if [[ "$GATE_STATUS" == "ERROR" ]]; then
            exit 1
          fi

      # Set commit status on the PR HEAD so branch protection sees the result.
      # workflow_run jobs run on the default branch, so their check runs don't
      # appear on the PR. We must explicitly post a commit status instead.
      - name: Set commit status
        if: always() && steps.pr.outputs.skip != 'true'
        uses: actions/github-script@v7
        env:
          GATE_STATUS: ${{ steps.gate.outputs.status || steps.check.outputs.status }}
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
        with:
          script: |
            const gate = process.env.GATE_STATUS;
            const sha = process.env.HEAD_SHA;
            const pr = process.env.PR_NUMBER;

            let state, description;
            if (gate === 'OK') {
              state = 'success';
              description = 'Quality Gate passed';
            } else if (gate === 'ERROR') {
              state = 'failure';
              description = 'Quality Gate failed';
            } else if (gate === 'skipped') {
              state = 'success';
              description = 'Skipped (no SONAR_TOKEN)';
            } else {
              state = 'success';
              description = 'Analysis not available';
            }

            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha,
              state,
              context: 'SonarCloud Quality Gate',
              description,
              target_url: `https://sonarcloud.io/summary/new_code?id=artifact-keeper_artifact-keeper&pullRequest=${pr}`,
            });

      - name: Post PR comment
        if: always() && steps.pr.outputs.skip != 'true'
        continue-on-error: true
        uses: actions/github-script@v7
        env:
          GATE_STATUS: ${{ steps.gate.outputs.status || steps.check.outputs.status }}
          COVERAGE: ${{ steps.gate.outputs.coverage }}
          DUPLICATION: ${{ steps.gate.outputs.duplication }}
          NEW_LINES: ${{ steps.gate.outputs.lines }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
        with:
          script: |
            const status = process.env.GATE_STATUS;
            const coverage = process.env.COVERAGE;
            const duplication = process.env.DUPLICATION;
            const lines = process.env.NEW_LINES;
            const prNumber = parseInt(process.env.PR_NUMBER) || 0;

            if (!prNumber) return;

            const marker = '<!-- sonarcloud-gate -->';
            let body = '';

            if (status === 'skipped' || status === 'NONE') {
              body = [
                marker,
                '### SonarCloud Quality Gate',
                '',
                'SonarCloud analysis not available for this PR.',
                'This may indicate a configuration issue. Check workflow logs.',
              ].join('\n');
            } else if (status === 'OK') {
              body = [
                marker,
                '### SonarCloud Quality Gate: Passed',
                '',
                '| Metric | Value | Threshold |',
                '|--------|-------|-----------|',
                `| Coverage on New Code | ${coverage}% | >= 70% |`,
                `| Duplication on New Code | ${duplication}% | <= 3% |`,
                `| New Lines | ${lines} | |`,
                '',
                `[View on SonarCloud](https://sonarcloud.io/summary/new_code?id=artifact-keeper_artifact-keeper&pullRequest=${prNumber})`,
              ].join('\n');
            } else if (status === 'ERROR') {
              body = [
                marker,
                '### SonarCloud Quality Gate: Failed',
                '',
                '| Metric | Value | Threshold |',
                '|--------|-------|-----------|',
                `| Coverage on New Code | ${coverage}% | >= 70% |`,
                `| Duplication on New Code | ${duplication}% | <= 3% |`,
                `| New Lines | ${lines} | |`,
                '',
                `[View details on SonarCloud](https://sonarcloud.io/summary/new_code?id=artifact-keeper_artifact-keeper&pullRequest=${prNumber})`,
              ].join('\n');
            } else {
              body = [
                marker,
                '### SonarCloud Quality Gate',
                '',
                `Quality gate status: ${status || 'unknown'}`,
              ].join('\n');
            }

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });

            const existing = comments.find(c => c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body,
              });
            }
