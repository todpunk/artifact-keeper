name: CI

on:
  push:
    branches: [main, master, develop, 'release/**']
    paths-ignore:
      - 'site/**'
      - '**/*.md'
      - '.beads/**'
      - 'LICENSE'
      - 'CLAUDE.md'
  pull_request:
    branches: [main, master, develop, 'release/**']
    paths-ignore:
      - 'site/**'
      - '**/*.md'
      - '.beads/**'
      - 'LICENSE'
      - 'CLAUDE.md'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ════════════════════════════════════════════════════════════════════════════
  # TIER 1: FAST CI (Every Push/PR) - Target: < 5 minutes
  # ════════════════════════════════════════════════════════════════════════════

  lint-rust:
    name: 🦀 Lint Rust
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  test-backend-unit:
    name: 🧪 Backend Unit Tests
    runs-on: ubuntu-latest
    needs: lint-rust
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Run unit tests
        env:
          SQLX_OFFLINE: true
        run: cargo test --workspace --lib --verbose

  coverage:
    name: 📊 Code Coverage
    runs-on: ubuntu-latest
    needs: lint-rust
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: registry
          POSTGRES_PASSWORD: registry
          POSTGRES_DB: artifact_registry
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Install cargo-llvm-cov
        run: cargo install cargo-llvm-cov

      - name: Run database migrations
        run: cargo install sqlx-cli --no-default-features --features postgres && sqlx migrate run --source backend/migrations
        env:
          DATABASE_URL: postgresql://registry:registry@localhost:5432/artifact_registry

      - name: Generate coverage report
        env:
          DATABASE_URL: postgresql://registry:registry@localhost:5432/artifact_registry
          SQLX_OFFLINE: true
        run: cargo llvm-cov --workspace --lib --lcov --output-path lcov.info

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v6
        with:
          name: lcov-coverage
          path: lcov.info

      - name: SonarCloud Scan
        if: env.SONAR_TOKEN != ''
        uses: SonarSource/sonarqube-scan-action@v7
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=artifact-keeper_artifact-keeper
            -Dsonar.organization=artifact-keeper
            -Dsonar.rust.lcov.reportPaths=lcov.info

  # ════════════════════════════════════════════════════════════════════════════
  # TIER 2: INTEGRATION (Main Branch Push Only)
  # ════════════════════════════════════════════════════════════════════════════

  test-backend-integration:
    name: 🔗 Backend Integration Tests
    runs-on: ubuntu-latest
    needs: lint-rust
    if: (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/release/')) && github.event_name == 'push'
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: registry
          POSTGRES_PASSWORD: registry
          POSTGRES_DB: artifact_registry
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Run integration tests
        env:
          DATABASE_URL: postgresql://registry:registry@localhost:5432/artifact_registry
          SQLX_OFFLINE: true
        run: cargo test --workspace --test '*' --verbose

  # ════════════════════════════════════════════════════════════════════════════
  # SMOKE E2E (Every Push/PR) — self-contained via Docker-in-Docker on ARC
  # Spins up fresh backend + postgres, runs native client tests, tears down
  # ════════════════════════════════════════════════════════════════════════════

  smoke-e2e:
    name: 🔥 Smoke E2E Tests
    runs-on: ak-e2e-runners
    needs: [test-backend-unit]
    permissions:
      contents: read
      packages: read
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - name: Wait for Docker daemon
        run: |
          echo "Waiting for DinD daemon..."
          for i in $(seq 1 30); do
            if docker info >/dev/null 2>&1; then
              echo "Docker daemon ready"
              docker version
              break
            fi
            echo "  Attempt $i/30..."
            sleep 2
          done
          docker info >/dev/null 2>&1 || { echo "ERROR: Docker daemon not available"; exit 1; }

      - name: Install Docker Compose
        run: |
          # Skip install if docker compose is already available
          if docker compose version >/dev/null 2>&1; then
            echo "Docker Compose already available:"
            docker compose version
            exit 0
          fi

          DOCKER_CONFIG=${DOCKER_CONFIG:-$HOME/.docker}
          COMPOSE_VERSION="v2.32.4"
          COMPOSE_BINARY="$DOCKER_CONFIG/cli-plugins/docker-compose"
          mkdir -p "$DOCKER_CONFIG/cli-plugins"

          echo "Downloading Docker Compose ${COMPOSE_VERSION}..."
          curl -fSL "https://github.com/docker/compose/releases/download/${COMPOSE_VERSION}/docker-compose-linux-x86_64" \
            -o "$COMPOSE_BINARY"

          # Verify download succeeded (curl -f returns non-zero on HTTP errors,
          # but also check file size as a safeguard)
          FILESIZE=$(stat -c%s "$COMPOSE_BINARY" 2>/dev/null || stat -f%z "$COMPOSE_BINARY" 2>/dev/null || echo "0")
          if [ "$FILESIZE" -lt 1000000 ]; then
            echo "ERROR: Downloaded file is ${FILESIZE} bytes (expected >60MB). Download likely failed."
            rm -f "$COMPOSE_BINARY"
            exit 1
          fi

          chmod +x "$COMPOSE_BINARY"
          docker compose version

      - name: Login to Docker Hub
        if: env.DOCKERHUB_USERNAME != ''
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Pull backend image
        run: |
          docker pull ghcr.io/artifact-keeper/artifact-keeper-backend:dev
          docker tag ghcr.io/artifact-keeper/artifact-keeper-backend:dev artifact-keeper-backend:test

      - name: Start smoke E2E stack
        run: docker compose -f docker-compose.test.yml --profile smoke up -d

      - name: Wait for tests to complete
        run: |
          echo "Waiting for test containers to finish..."
          timeout 480 docker wait e2e-test-pypi e2e-test-npm e2e-test-cargo || {
            echo "ERROR: Tests timed out. Container statuses:"
            docker ps -a --filter "name=e2e-test" --format "table {{.Names}}\t{{.Status}}"
            echo ""
            echo "Backend logs (last 50 lines):"
            docker logs e2e-test-backend --tail 50 2>&1 || true
            exit 1
          }

      - name: Show test results
        if: always()
        run: |
          failed=false
          for test in pypi npm cargo; do
            container="e2e-test-${test}"
            exit_code=$(docker inspect --format='{{.State.ExitCode}}' "$container" 2>/dev/null || echo "N/A")
            echo ""
            echo "═══════════════════════════════════════════"
            echo "  ${test} — Exit Code: $exit_code"
            echo "═══════════════════════════════════════════"
            docker logs "$container" 2>&1 || true
            if [ "$exit_code" != "0" ]; then failed=true; fi
          done
          if [ "$failed" = "true" ]; then exit 1; fi

      - name: Cleanup
        if: always()
        run: docker compose -f docker-compose.test.yml --profile smoke down -v --remove-orphans

  # ════════════════════════════════════════════════════════════════════════════
  # CONTAINER BUILDS (PR only, path-filtered, parallel)
  # ════════════════════════════════════════════════════════════════════════════

  detect-changes:
    name: 🔍 Detect Changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    if: github.event_name == 'pull_request'
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      openscap: ${{ steps.filter.outputs.openscap }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'docker/Dockerfile.backend'
              - 'backend/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - '.sqlx/**'
            openscap:
              - 'docker/Dockerfile.openscap'
              - 'scripts/openscap-wrapper.py'

  build-backend-image:
    name: 🐳 Build Backend Image
    runs-on: ubuntu-24.04
    needs: detect-changes
    if: needs.detect-changes.outputs.backend == 'true'
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./docker/Dockerfile.backend
          platforms: linux/amd64
          push: false
          load: true
          tags: artifact-keeper-backend:pr-test
          cache-from: type=gha,scope=backend-linux/amd64
          cache-to: type=gha,scope=backend-linux/amd64,mode=max

      - name: Verify image starts
        run: |
          docker run --rm -d --name ak-test -p 8080:8080 \
            -e DATABASE_URL=postgresql://test:test@localhost/test \
            artifact-keeper-backend:pr-test || true
          sleep 2
          docker logs ak-test 2>&1 | head -20 || true
          docker rm -f ak-test 2>/dev/null || true

      - name: Image size
        run: |
          echo "## Backend Image" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          docker images artifact-keeper-backend:pr-test --format "table {{.Repository}}\t{{.Tag}}\t{{.Size}}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

  build-openscap-image:
    name: 🐳 Build OpenSCAP Image
    runs-on: ubuntu-24.04
    needs: detect-changes
    if: needs.detect-changes.outputs.openscap == 'true'
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build openscap image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./docker/Dockerfile.openscap
          platforms: linux/amd64
          push: false
          load: true
          tags: artifact-keeper-openscap:pr-test
          cache-from: type=gha,scope=openscap-linux/amd64
          cache-to: type=gha,scope=openscap-linux/amd64,mode=max

      - name: Verify image starts
        run: |
          docker run --rm -d --name oscap-test -p 8091:8091 \
            artifact-keeper-openscap:pr-test || true
          sleep 3
          docker logs oscap-test 2>&1 | head -20 || true
          docker rm -f oscap-test 2>/dev/null || true

      - name: Image size
        run: |
          echo "## OpenSCAP Image" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          docker images artifact-keeper-openscap:pr-test --format "table {{.Repository}}\t{{.Tag}}\t{{.Size}}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

  # ════════════════════════════════════════════════════════════════════════════
  # SECURITY (Runs on all events, non-blocking)
  # ════════════════════════════════════════════════════════════════════════════

  security-audit:
    name: 🔒 Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked || true

      - name: Audit Rust dependencies
        run: cargo audit
        continue-on-error: true

  # ════════════════════════════════════════════════════════════════════════════
  # FINAL STATUS
  # ════════════════════════════════════════════════════════════════════════════

  ci-complete:
    name: ✅ CI Complete
    runs-on: ubuntu-latest
    needs: [lint-rust, test-backend-unit, coverage, test-backend-integration, smoke-e2e, build-backend-image, build-openscap-image, security-audit]
    if: always()
    steps:
      - name: Check CI status
        run: |
          echo "## CI Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          tier1_pass=true

          # Tier 1 jobs (required)
          for job in lint-rust test-backend-unit; do
            result="${{ needs.lint-rust.result }}"
            [ "$job" = "test-backend-unit" ] && result="${{ needs.test-backend-unit.result }}"
            if [[ "$result" == "success" ]]; then
              echo "✅ $job" >> $GITHUB_STEP_SUMMARY
            else
              echo "❌ $job: $result" >> $GITHUB_STEP_SUMMARY
              tier1_pass=false
            fi
          done

          # Smoke E2E
          if [[ "${{ needs.smoke-e2e.result }}" == "success" ]]; then
            echo "✅ smoke-e2e" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ smoke-e2e: ${{ needs.smoke-e2e.result }}" >> $GITHUB_STEP_SUMMARY
            tier1_pass=false
          fi

          # Integration tests (main push only, skip check on PRs)
          integ_result="${{ needs.test-backend-integration.result }}"
          if [[ "$integ_result" == "success" ]]; then
            echo "✅ integration-tests" >> $GITHUB_STEP_SUMMARY
          elif [[ "$integ_result" == "skipped" ]]; then
            echo "⏭️ integration-tests (PR — skipped)" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ integration-tests: $integ_result" >> $GITHUB_STEP_SUMMARY
            tier1_pass=false
          fi

          # Container builds (PR only, skipped on push or when files unchanged)
          for img in backend openscap; do
            result="${{ needs.build-backend-image.result }}"
            [ "$img" = "openscap" ] && result="${{ needs.build-openscap-image.result }}"
            if [[ "$result" == "success" ]]; then
              echo "✅ build-${img}-image" >> $GITHUB_STEP_SUMMARY
            elif [[ "$result" == "skipped" ]]; then
              echo "⏭️ build-${img}-image (no changes)" >> $GITHUB_STEP_SUMMARY
            else
              echo "❌ build-${img}-image: $result" >> $GITHUB_STEP_SUMMARY
              tier1_pass=false
            fi
          done

          # Coverage (non-blocking)
          if [[ "${{ needs.coverage.result }}" == "success" ]]; then
            echo "✅ coverage" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ coverage: ${{ needs.coverage.result }}" >> $GITHUB_STEP_SUMMARY
          fi

          # Security audit (non-blocking)
          if [[ "${{ needs.security-audit.result }}" == "success" ]]; then
            echo "✅ security-audit" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ security-audit: ${{ needs.security-audit.result }}" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY

          if [[ "$tier1_pass" != "true" ]]; then
            echo "❌ **CI Failed**" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi

          echo "✅ **CI Passed**" >> $GITHUB_STEP_SUMMARY
